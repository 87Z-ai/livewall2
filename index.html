<<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-Live-Wall V1.0</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
        body { background-color: #d4d4d4; color: #000000; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .window { background-color: #d4d4d4; width: 100%; max-width: 800px; padding: 10px; }
        h1 { font-size: 2rem; margin: 0 0 15px 0; color: #000000; font-weight: bold; border-bottom: 2px solid #000000; padding-bottom: 5px; }
        h2 { font-size: 1.2rem; margin: 10px 0; color: #000000; font-weight: normal; }
        .login-box { border: 1px solid #000000; background: #ffffff; padding: 20px; max-width: 400px; margin: 0 auto; }
        input[type="text"], input[type="password"] { width: 100%; padding: 6px; margin: 5px 0 15px 0; border: 1px solid #7f7f7f; background: #ffffff; color: #000000; font-size: 1rem; }
        button { padding: 8px 20px; background-color: #000080; color: #ffffff; border: 1px solid #000000; font-size: 1rem; cursor: pointer; font-weight: normal; }
        button:hover { background-color: #0000ff; }
        .hidden { display: none !important; }
        .chat-display { width: 100%; height: 350px; background-color: #ffffff; border: 1px solid #7f7f7f; overflow-y: auto; padding: 10px; margin-bottom: 15px; font-family: 'Courier New', Courier, monospace; font-size: 0.95rem; line-height: 1.4; }
        .msg-line { margin-bottom: 8px; color: #000000; text-align: left; word-break: break-word; }
        .admin-line { color: #000080; font-weight: bold; }
        .input-row { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 15px; }
        .input-label { font-size: 1.1rem; white-space: nowrap; }
        .status-bar { text-align: left; font-size: 0.9rem; color: #333333; font-family: 'Courier New', Courier, monospace; margin-top: 10px; }
        .admin-panel { border: 1px dashed #000080; padding: 10px; margin-top: 15px; background: #e6e6fa; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-danger { background-color: #800000; }
        .btn-danger:hover { background-color: #ff0000; }
        .btn-global { background-color: #4b0082; }
        .btn-global:hover { background-color: #8a2be2; }
    </style>
</head>
<body>

    <div class="window">
        <div id="login-panel" class="login-box">
            <h1 style="border: none; font-size: 1.5rem; text-align: center;">Schul-Live-Wall Login</h1>
            <label>Raumnummer:</label>
            <input type="text" id="room-input" placeholder="z.B. 1">
            <label>Verwaltungs-Code (Optional):</label>
            <input type="password" id="password-input">
            <button onclick="joinRoom()" style="width: 100%;">Anmelden</button>
        </div>

        <div id="chat-panel" class="hidden">
            <h1>Schul-Live-Wall V1.0</h1>
            <h2 id="room-title">Raum: -</h2>
            <div id="messages-feed" class="chat-display"></div>
            
            <div class="input-row">
                <span class="input-label">Nachricht:</span>
                <input type="text" id="msg-input" style="margin: 0; flex: 1;" placeholder="...">
                <button onclick="sendMessage()">Senden</button>
            </div>

            <div id="admin-controls" class="admin-panel hidden">
                <button onclick="sendGlobalMessage()" class="btn-global">📢 Globale Durchsage</button>
                <button onclick="clearCurrentRoom()" class="btn-danger">🧹 Diesen Raum löschen</button>
                <button onclick="clearAllRooms()" class="btn-danger">💥 Komplett-Reset (Alle Räume)</button>
            </div>

            <div id="status-bar" class="status-bar">[STATUS: Bereit]</div>
        </div>
    </div>

    <script>
        const GH_USER = "87z-ai"; 
        const GH_REPO = "wall-data"; 
        
        const PART_1 = "ghp_wMlPvO28eyAgoRdr";
        const PART_2 = "LhgOvR81gaOIrU1YMOSG";
        const GH_TOKEN = PART_1 + PART_2; 

        let currentRoom = "";
        let roomIssueNumber = null;
        let isAdmin = false;
        const ADMIN_PASSWORD = "X7#mK!2pQ$9vWL";

        async function joinRoom() {
            const roomVal = document.getElementById("room-input").value.trim();
            const passVal = document.getElementById("password-input").value.trim();
            if (!roomVal) { alert("Bitte eine Raumnummer eingeben."); return; }

            currentRoom = roomVal;
            
            if (passVal === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById("room-title").innerText = "Raum: " + currentRoom + " [ADMINISTRATOR]";
                document.getElementById("admin-controls").classList.remove("hidden"); // Admin-Knöpfe einblenden
            } else {
                isAdmin = false;
                document.getElementById("room-title").innerText = "Raum: " + currentRoom;
                document.getElementById("admin-controls").classList.add("hidden");
            }

            document.getElementById("login-panel").classList.add("hidden");
            document.getElementById("chat-panel").classList.remove("hidden");

            document.getElementById("status-bar").innerText = "[STATUS: Verbinde mit GitHub-Tunnel...]";
            await getOrCreateRoomIssue();
            
            setInterval(loadMessages, 3000);
        }

        async function getOrCreateRoomIssue() {
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues?state=all&per_page=100`, {
                    headers: { "Authorization": `token ${GH_TOKEN}` }
                });
                let issues = [];
                if (res.ok) { issues = await res.json(); }
                if (!Array.isArray(issues)) { issues = []; }

                let existing = issues.find(i => i.title === `Raum-${currentRoom}`);

                if (existing) {
                    roomIssueNumber = existing.number;
                } else {
                    let createRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues`, {
                        method: "POST",
                        headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ title: `Raum-${currentRoom}`, body: `Live-Chat für Raum ${currentRoom}` })
                    });
                    let newIssue = await createRes.json();
                    roomIssueNumber = newIssue.number;
                }
                document.getElementById("status-bar").innerText = "[STATUS: Live-Tunnel aktiv]";
                loadMessages();
            } catch (e) {
                document.getElementById("status-bar").innerText = "[HINWEIS] Verbindung erzwungen...";
                roomIssueNumber = 1;
                loadMessages();
            }
        }

        async function loadMessages() {
            if (!roomIssueNumber) return;
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues/${roomIssueNumber}/comments?per_page=100`, {
                    headers: { "Authorization": `token ${GH_TOKEN}` }
                });
                if (res.ok) {
                    let comments = await res.json();
                    const feed = document.getElementById("messages-feed");
                    feed.innerHTML = "";
                    if (Array.isArray(comments)) {
                        comments.forEach(c => {
                            const div = document.createElement("div");
                            div.classList.add("msg-line");
                            if (c.body.startsWith("[VERWALTUNG]")) {
                                div.classList.add("admin-line");
                            }
                            div.innerText = c.body;
                            feed.appendChild(div);
                        });
                    }
                    feed.scrollTop = feed.scrollHeight;
                }
            } catch (e) {}
        }

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text || !roomIssueNumber) return;

            const date = new Date();
            const timeStr = date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            const prefix = isAdmin ? `[VERWALTUNG] [${timeStr}]: ` : `Benutzer [${timeStr}]: `;
            const fullMessage = prefix + text;

            const feed = document.getElementById("messages-feed");
            const div = document.createElement("div");
            div.classList.add("msg-line");
            if (isAdmin) div.classList.add("admin-line");
            div.innerText = fullMessage;
            feed.appendChild(div);
            feed.scrollTop = feed.scrollHeight;

            input.value = "";

            try {
                await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues/${roomIssueNumber}/comments`, {
                    method: "POST",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ body: fullMessage })
                });
            } catch (error) {}
        }

        // FUNKTION 1: Globale Durchsage an alle Chaträume senden
        async function sendGlobalMessage() {
            const text = prompt("Gib die globale Admin-Durchsage ein:");
            if (!text) return;

            document.getElementById("status-bar").innerText = "[ADMIN: Sende globale Durchsage...]";
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues?state=all`, {
                    headers: { "Authorization": `token ${GH_TOKEN}` }
                });
                let issues = await res.json();
                
                for (let issue of issues) {
                    await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues/${issue.number}/comments`, {
                        method: "POST",
                        headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ body: `[VERWALTUNG] 📢 GLOBALE DURCHSAGE: ${text}` })
                    });
                }
                document.getElementById("status-bar").innerText = "[ADMIN: Durchsage gesendet!]";
                loadMessages();
            } catch (e) {
                alert("Fehler bei der Durchsage: " + e.message);
            }
        }

        // FUNKTION 2: Aktuellen Raum komplett leeren
        async function clearCurrentRoom() {
            if (!confirm("Möchtest du wirklich alle Nachrichten aus diesem Raum löschen?")) return;
            document.getElementById("status-bar").innerText = "[ADMIN: Lösche aktuellen Raum...]";
            
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues/${roomIssueNumber}/comments`, {
                    headers: { "Authorization": `token ${GH_TOKEN}` }
                });
                let comments = await res.json();

                for (let comment of comments) {
                    await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues/comments/${comment.id}`, {
                        method: "DELETE",
                        headers: { "Authorization": `token ${GH_TOKEN}` }
                    });
                }
                document.getElementById("status-bar").innerText = "[ADMIN: Raum geleert]";
                document.getElementById("messages-feed").innerHTML = "";
            } catch (e) {
                alert("Fehler beim Löschen: " + e.message);
            }
        }

        // FUNKTION 3: Alle Räume gleichzeitig leeren
        async function clearAllRooms() {
            if (!confirm("ACHTUNG: Möchtest du wirklich ABSOLUT ALLE Nachrichten aus ALLEN Räumen löschen?")) return;
            document.getElementById("status-bar").innerText = "[ADMIN: Führe Komplett-Reset durch...]";

            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues?state=all`, {
                    headers: { "Authorization": `token ${GH_TOKEN}` }
                });
                let issues = await res.json();

                for (let issue of issues) {
                    let cRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues/${issue.number}/comments`, {
                        headers: { "Authorization": `token ${GH_TOKEN}` }
                    });
                    let comments = await cRes.json();
                    
                    for (let comment of comments) {
                        await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/issues/comments/${comment.id}`, {
                            method: "DELETE",
                            headers: { "Authorization": `token ${GH_TOKEN}` }
                        });
                    }
                }
                document.getElementById("status-bar").innerText = "[ADMIN: Komplett-Reset erfolgreich]";
                document.getElementById("messages-feed").innerHTML = "";
            } catch (e) {
                alert("Fehler beim Komplett-Reset: " + e.message);
            }
        }
    </script>
</body>
</html>
