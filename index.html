<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-Live-Wall</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #1e293b; padding: 2rem; border-radius: 12px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { color: #a855f7; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 0.75rem; margin: 0.5rem 0; border-radius: 6px; border: 1px solid #475569; background-color: #334155; color: white; font-size: 1rem; }
        button { width: 100%; padding: 0.75rem; margin-top: 1rem; background-color: #a855f7; color: white; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .chat-container { width: 100%; max-width: 600px; height: 90vh; display: flex; flex-direction: column; background: #1e293b; border-radius: 12px; padding: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .msg-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .msg { background: #334155; padding: 0.75rem; border-radius: 8px; text-align: left; word-break: break-word; }
        .admin-msg { border-left: 4px solid #a855f7; background: #3b0764; font-weight: bold; }
        .input-area { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .announcement { background: #b45309; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; text-align: left; font-weight: bold; border-left: 4px solid #f59e0b; }
        .admin-box { background-color: #1e1b4b; border: 1px solid #4338ca; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: left; }
        .admin-badge { background-color: #a855f7; color: white; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.8rem; margin-left: 0.5rem; vertical-align: middle; }
        .delete-btn { background-color: #ef4444; margin-top: 0.5rem; font-size: 0.9rem; padding: 0.5rem; }
    </style>
</head>
<body>

    <div id="login-panel" class="container">
        <h1>🎒 Schul-Live-Wall</h1>
        <input type="text" id="room-input" placeholder="Raumnummer eingeben (z.B. 1)">
        <input type="password" id="password-input" placeholder="Admin-Passwort (optional)">
        <button onclick="joinRoom()">Raum betreten</button>
    </div>

    <div id="chat-panel" class="chat-container hidden">
        <h2>
            <span id="room-title">Raum: -</span>
            <span id="admin-badge" class="admin-badge hidden">Mister Admin</span>
        </h2>

        <div id="admin-panel" class="admin-box hidden">
            <h4 style="margin: 0 0 0.5rem 0; color: #c084fc;">Ankündigung für alle Räume senden:</h4>
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="announcement-input" placeholder="Wichtige Durchsage..." style="margin: 0;">
                <button onclick="sendAnnouncement()" style="width: auto; margin: 0; background: #4338ca; padding: 0.5rem 1rem;">Senden</button>
            </div>
            <button onclick="clearCurrentRoom()" class="delete-btn">🧹 Diesen Raum komplett leeren</button>
        </div>

        <div id="announcement-box" class="announcement hidden"></div>
        <div id="messages-feed" class="msg-list"></div>
        
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Deine Nachricht...">
            <button onclick="sendMessage()" style="width: auto; margin: 0; padding: 0.75rem 1.5rem;">Senden</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lgvcgmvbdbabowwxgqmcv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxndmNnbXZiZGFib3d3eGdxbWN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjEyNjMsImV4cCI6MjA5NDY5NzI2M30.X3xv6v3d5OCGsgVx4SeIVQRa0aZHFC9jejpQI5ptnvs";
        
        let _supabaseClient = null;
        let currentRoom = "";
        let isAdmin = false;
        const ADMIN_PASSWORD = "AndrejIstDerBeste/XXX";

        function joinRoom() {
            try {
                const roomVal = document.getElementById("room-input").value.trim();
                const passVal = document.getElementById("password-input").value.trim();

                if (!roomVal) {
                    alert("Bitte gib eine Raumnummer ein!");
                    return;
                }

                currentRoom = roomVal;
                
                // Admin Status checken
                if (passVal === ADMIN_PASSWORD) {
                    isAdmin = true;
                    document.getElementById("admin-badge").classList.remove("hidden");
                    document.getElementById("admin-panel").classList.remove("hidden");
                }

                // UI umschalten
                document.getElementById("room-title").innerText = "Raum: " + currentRoom;
                document.getElementById("login-panel").classList.add("hidden");
                document.getElementById("chat-panel").classList.remove("hidden");

                // Supabase initialisieren
                if (window.supabase) {
                    _supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    
                    loadMessages();
                    loadAnnouncements();

                    // Realtime für neue Nachrichten UND Löschungen (Abbestellen/Neu laden) abonnieren
                    _supabaseClient
                        .channel('schema-db-changes')
                        .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                            loadMessages(); // Bei jeder Änderung einfach sauber neu laden
                        })
                        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'announcements' }, payload => {
                            loadAnnouncements();
                        })
                        .subscribe();
                }
            } catch (err) {
                console.error(err);
            }
        }

        async function loadMessages() {
            if (!_supabaseClient) return;
            try {
                const { data, error } = await _supabaseClient
                    .from('messages')
                    .select('*')
                    .eq('room', currentRoom)
                    .order('id', { ascending: true });

                if (!error && data) {
                    const feed = document.getElementById("messages-feed");
                    feed.innerHTML = "";
                    data.forEach(msg => {
                        const div = document.createElement("div");
                        div.classList.add("msg");
                        if (msg.admin_post === "true") {
                            div.classList.add("admin-msg");
                            div.innerText = "⭐ Admin: " + msg.text;
                        } else {
                            div.innerText = msg.text;
                        }
                        feed.appendChild(div);
                    });
                    feed.scrollTop = feed.scrollHeight;
                }
            } catch(e) {}
        }

        async function loadAnnouncements() {
            if (!_supabaseClient) return;
            try {
                const { data } = await _supabaseClient.from('announcements').select('*').order('id', { ascending: false }).limit(1);
                if (data && data.length > 0) {
                    const box = document.getElementById("announcement-box");
                    box.innerText = "📢 DURCHSAGE: " + data[0].text;
                    box.classList.remove("hidden");
                }
            } catch(e) {}
        }

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text || !_supabaseClient) return;

            try {
                const { error } = await _supabaseClient
                    .from('messages')
                    .insert([{ 
                        room: currentRoom, 
                        text: text,
                        admin_post: isAdmin ? "true" : "false"
                    }]);

                if (error) {
                    alert("Fehler beim Senden! Überprüfe die Supabase Spalten.");
                } else {
                    input.value = "";
                }
            } catch(e) {}
        }

        // NEU: Admin Funktion zum Senden einer Ankündigung
        async function sendAnnouncement() {
            const input = document.getElementById("announcement-input");
            const text = input.value.trim();
            if (!text || !_supabaseClient) return;

            try {
                const { error } = await _supabaseClient.from('announcements').insert([{ text: text }]);
                if (!error) input.value = "";
            } catch(e) {}
        }

        // NEU: Admin Funktion zum Leeren des aktuellen Raums
        async function clearCurrentRoom() {
            if (!confirm("Möchtest du wirklich alle Nachrichten aus Raum " + currentRoom + " löschen?")) return;
            if (!_supabaseClient) return;

            try {
                const { error } = await _supabaseClient.from('messages').delete().eq('room', currentRoom);
                if (error) alert("Fehler beim Löschen!");
            } catch(e) {}
        }
    </script>
</body>
</html>
