<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-Live-Wall V1.0</title>
    <style>
        /* Klassisches Retro- / Windows-95-Design */
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
        body { background-color: #d4d4d4; color: #000000; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .window { 
            background-color: #d4d4d4; 
            width: 100%; 
            max-width: 800px; 
            padding: 4px; 
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #555555;
            border-bottom: 2px solid #555555;
        }
        
        /* Die obere blaue Titelleiste des Fensters */
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: #ffffff;
            padding: 4px 6px;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        h2 { font-size: 1.2rem; margin: 10px 0; color: #000000; font-weight: normal; }
        
        .login-box { 
            background: #d4d4d4; 
            padding: 10px; 
            max-width: 400px; 
            margin: 30px auto; 
        }
        
        .login-content {
            background: #d4d4d4;
            padding: 15px;
        }

        label { display: block; margin-top: 10px; font-size: 0.95rem; }

        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 4px; 
            margin: 4px 0 12px 0; 
            border-top: 2px solid #555555;
            border-left: 2px solid #555555;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background: #ffffff; 
            color: #000000; 
            font-size: 1rem; 
            outline: none;
        }
        
        button { 
            padding: 6px 20px; 
            background-color: #d4d4d4; 
            color: #000000; 
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #555555;
            border-bottom: 2px solid #555555;
            font-size: 1rem; 
            cursor: pointer; 
            font-weight: normal; 
            outline: none;
        }
        button:active { 
            border-top: 2px solid #555555;
            border-left: 2px solid #555555;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        
        .hidden { display: none !important; }
        
        /* Das globale Admin-Banner im Windows-Look verpackt */
        .global-announcement-bar {
            background-color: #ffffe1; /* Klassisches hellgelbes Hinweisfenster */
            color: #000000;
            padding: 10px;
            font-weight: bold;
            border-top: 2px solid #555555;
            border-left: 2px solid #555555;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            margin-bottom: 15px;
            text-align: center;
            font-size: 1.05rem;
            box-shadow: 1px 1px 0px #000000;
        }

        .chat-display { 
            width: 100%; 
            height: 350px; 
            background-color: #ffffff; 
            border-top: 2px solid #555555;
            border-left: 2px solid #555555;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            overflow-y: auto; 
            padding: 10px; 
            margin-bottom: 15px; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 0.95rem; 
            line-height: 1.4; 
        }
        
        .msg-line { margin-bottom: 8px; color: #000000; text-align: left; word-break: break-word; }
        .admin-line { color: #000080; font-weight: bold; }
        .input-row { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 15px; }
        .input-label { font-size: 1.1rem; white-space: nowrap; }
        
        /* Statusleiste unten am Fensterrahmen */
        .status-bar { 
            text-align: left; 
            font-size: 0.9rem; 
            color: #000000; 
            font-family: Arial, sans-serif; 
            margin-top: 5px; 
            padding: 3px;
            border-top: 2px solid #555555;
            border-left: 2px solid #555555;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            background-color: #d4d4d4;
        }
        
        .admin-panel { 
            border-top: 2px solid #555555;
            border-left: 2px solid #555555;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
            padding: 15px; 
            margin-top: 15px; 
            background: #d4d4d4; 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
        }
        .admin-panel-title {
            width: 100%;
            font-size: 0.9rem;
            font-weight: bold;
            color: #000080;
            margin-bottom: 5px;
        }
        .btn-admin-default { color: #000000; font-weight: normal; }
    </style>
</head>
<body>

    <div class="window">
        <div class="title-bar">
            <span id="window-title-text">Schul-Live-Wall V1.0</span>
            <span style="font-size: 0.8rem; cursor: default; border: 1px solid #ffffff; padding: 0px 4px; background: #d4d4d4; color: #000; font-weight: bold;">X</span>
        </div>

        <div id="login-panel" class="login-box">
            <div class="login-content">
                <h1 style="font-size: 1.4rem; text-align: center; margin-top: 0;">System-Anmeldung</h1>
                <label>Raumnummer:</label>
                <input type="text" id="room-input" placeholder="z.B. 1">
                <label>Verwaltungs-Code (Optional):</label>
                <input type="password" id="password-input">
                <button onclick="joinRoom()" style="width: 100%; margin-top: 10px;">Anmelden</button>
            </div>
        </div>

        <div id="chat-panel" class="hidden" style="padding: 6px;">
            <div id="global-announcement" class="global-announcement-bar hidden"></div>

            <h2 id="room-title">Raum: -</h2>
            <div id="messages-feed" class="chat-display"></div>
            
            <div class="input-row">
                <span class="input-label">Nachricht:</span>
                <input type="text" id="msg-input" style="margin: 0; flex: 1;" placeholder="...">
                <button onclick="sendMessage()">Senden</button>
            </div>

            <div id="admin-controls" class="admin-panel hidden">
                <div class="admin-panel-title">System-Verwaltung Werkzeuge:</div>
                <button onclick="sendGlobalMessage()" class="btn-admin-default">Globale Durchsage</button>
                <button onclick="clearCurrentRoom()" class="btn-admin-default">Diesen Raum löschen</button>
                <button onclick="clearAllRooms()" class="btn-admin-default">Komplett-Reset</button>
            </div>
        </div>
        
        <div id="status-bar" class="status-bar">Bereit.</div>
    </div>

    <script>
        const GH_USER = "87z-ai"; 
        const GH_REPO = "wall-data"; 
        
        const PART_1 = "ghp_wMlPvO28eyAgoRdr";
        const PART_2 = "LhgOvR81gaOIrU1YMOSG";
        const GH_TOKEN = PART_1 + PART_2; 

        let currentRoom = "";
        let roomSha = ""; 
        let globalSha = "";
        let localMessages = [];
        let isAdmin = false;
        const ADMIN_PASSWORD = "X7#mK!2pQ$9vWL";

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function joinRoom() {
            const roomVal = document.getElementById("room-input").value.trim();
            const passVal = document.getElementById("password-input").value.trim();
            if (!roomVal) { alert("Bitte eine Raumnummer eingeben."); return; }

            currentRoom = roomVal;
            
            if (passVal === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById("room-title").innerText = "Raum: " + currentRoom + " [ADMINISTRATOR]";
                document.getElementById("window-title-text").innerText = "Schul-Live-Wall V1.0 [ADMIN-MODUS]";
                document.getElementById("admin-controls").classList.remove("hidden");
            } else {
                isAdmin = false;
                document.getElementById("room-title").innerText = "Raum: " + currentRoom;
                document.getElementById("admin-controls").classList.add("hidden");
            }

            document.getElementById("login-panel").classList.add("hidden");
            document.getElementById("chat-panel").classList.remove("hidden");
            document.getElementById("status-bar").innerText = "Synchronisiere mit Server...";
            
            await loadAllData();
            setInterval(loadAllData, 3000);
        }

        async function loadAllData() {
            let globalMessageText = "";

            // 1. Zentrale Steuerungsdatei laden
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/global_system.json`, {
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                });
                if (res.ok) {
                    let data = await res.json();
                    globalSha = data.sha;
                    let systemData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    if (systemData) {
                        globalMessageText = systemData.globalMessage || "";
                    }
                }
            } catch (e) {}

            // Visuelle Steuerung des Banners (Gelbe Infobox)
            const banner = document.getElementById("global-announcement");
            if (globalMessageText) {
                banner.innerText = "📢 GLOBALE DURCHSAGE: " + globalMessageText;
                banner.classList.remove("hidden");
            } else {
                banner.classList.add("hidden");
            }

            // 2. Normalen Raum-Chatverlauf laden
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                });
                
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.sha;
                    let content = atob(data.content);
                    localMessages = JSON.parse(decodeURIComponent(escape(content)));
                } else {
                    roomSha = "";
                    localMessages = [];
                }
            } catch (e) {
                localMessages = [];
            }

            renderFeed();
            document.getElementById("status-bar").innerText = "Live-Verbindung zum Server aktiv.";
        }

        function renderFeed() {
            const feed = document.getElementById("messages-feed");
            if (!feed) return;
            
            let linesHtml = "";
            if (Array.isArray(localMessages)) {
                localMessages.forEach(msg => {
                    let isAdminLine = msg.startsWith("[VERWALTUNG]");
                    linesHtml += `<div class="msg-line ${isAdminLine ? 'admin-line' : ''}">${msg}</div>`;
                });
            }
            feed.innerHTML = linesHtml;
            feed.scrollTop = feed.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text) return;

            const date = new Date();
            const timeStr = date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            const prefix = isAdmin ? `[VERWALTUNG] [${timeStr}]: ` : `Benutzer [${timeStr}]: `;
            const fullMessage = prefix + text;

            if (!Array.isArray(localMessages)) localMessages = [];
            localMessages.push(fullMessage);
            renderFeed();
            input.value = "";

            try {
                let jsonStr = unescape(encodeURIComponent(JSON.stringify(localMessages)));
                let base64Content = btoa(jsonStr);

                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Nachricht gesendet",
                        content: base64Content,
                        sha: roomSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.content.sha;
                }
            } catch (error) {}
        }

        async function sendGlobalMessage() {
            const text = prompt("Gib die globale Admin-Durchsage ein (Leerlassen zum Löschen):");
            if (text === null) return; 

            document.getElementById("status-bar").innerText = "Sende Durchsage an Zentral-Server...";
            
            let payload = { globalMessage: text.trim() };
            let jsonStr = unescape(encodeURIComponent(JSON.stringify(payload)));

            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/global_system.json`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Globale Durchsage geändert",
                        content: btoa(jsonStr),
                        sha: globalSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    globalSha = data.content.sha;
                    document.getElementById("status-bar").innerText = "Durchsage erfolgreich geschaltet!";
                }
            } catch (e) { alert("Fehler: " + e.message); }
            await loadAllData();
        }

        async function clearCurrentRoom() {
            if (!confirm("Möchtest du diesen Raum löschen?")) return;
            document.getElementById("status-bar").innerText = "Leere aktuellen Raum...";
            
            try {
                localMessages = ["[VERWALTUNG] System-Meldung: Der Verlauf dieses Raums wurde vom Administrator zurückgesetzt."];
                let jsonStr = unescape(encodeURIComponent(JSON.stringify(localMessages)));
                
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Raum geleert",
                        content: btoa(jsonStr),
                        sha: roomSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.content.sha;
                }
                renderFeed();
                document.getElementById("status-bar").innerText = "Raum erfolgreich geleert.";
            } catch (e) {}
        }

        async function clearAllRooms() {
            if (!confirm("ACHTUNG: Möchtest du wirklich alle Standardräume 1 bis 20 unwiderruflich leeren?")) return;
            
            let resetContent = ["[VERWALTUNG] System-Meldung: Globaler Reset durchgeführt."];
            let jsonStr = unescape(encodeURIComponent(JSON.stringify(resetContent)));
            let base64Content = btoa(jsonStr);

            for (let i = 1; i <= 20; i++) {
                document.getElementById("status-bar").innerText = `Reset aktiv bei Raum ${i} von 20...`;
                try {
                    let rSha = "";
                    let gRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${i}.json`, {
                        headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                    });
                    if (gRes.ok) {
                        let gData = await gRes.json();
                        rSha = gData.sha;
                    }

                    await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${i}.json`, {
                        method: "PUT",
                        headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: "Globaler Reset",
                            content: base64Content,
                            sha: rSha || undefined
                        })
                    });
                    
                    await delay(300);
                } catch(e) {}
            }

            document.getElementById("status-bar").innerText = "Komplett-Reset erfolgreich beendet.";
            await loadAllData();
        }
    </script>
</body>
</html>
