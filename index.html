<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-Live-Wall V1.0</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
        body { background-color: #d4d4d4; color: #000000; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .window { background-color: #d4d4d4; width: 100%; max-width: 800px; padding: 10px; }
        h1 { font-size: 2rem; margin: 0 0 15px 0; color: #000000; font-weight: bold; border-bottom: 2px solid #000000; padding-bottom: 5px; }
        h2 { font-size: 1.2rem; margin: 10px 0; color: #000000; font-weight: normal; }
        .login-box { border: 1px solid #000000; background: #ffffff; padding: 20px; max-width: 400px; margin: 0 auto; }
        input[type="text"], input[type="password"] { width: 100%; padding: 6px; margin: 5px 0 15px 0; border: 1px solid #7f7f7f; background: #ffffff; color: #000000; font-size: 1rem; }
        
        button { 
            padding: 8px 20px; 
            background-color: #d4d4d4; 
            color: #000000; 
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #555555;
            border-bottom: 2px solid #555555;
            font-size: 1rem; 
            cursor: pointer; 
            font-weight: normal; 
        }
        button:active { 
            border-top: 2px solid #555555;
            border-left: 2px solid #555555;
            border-right: 2px solid #ffffff;
            border-bottom: 2px solid #ffffff;
        }
        
        .hidden { display: none !important; }
        .chat-display { width: 100%; height: 350px; background-color: #ffffff; border: 1px solid #7f7f7f; overflow-y: auto; padding: 10px; margin-bottom: 15px; font-family: 'Courier New', Courier, monospace; font-size: 0.95rem; line-height: 1.4; }
        .msg-line { margin-bottom: 8px; color: #000000; text-align: left; word-break: break-word; }
        .admin-line { color: #000080; font-weight: bold; }
        .input-row { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 15px; }
        .input-label { font-size: 1.1rem; white-space: nowrap; }
        .status-bar { text-align: left; font-size: 0.9rem; color: #333333; font-family: 'Courier New', Courier, monospace; margin-top: 10px; }
        
        .admin-panel { 
            border: 1px solid #000000; 
            padding: 15px; 
            margin-top: 15px; 
            background: #d4d4d4; 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
        }
        .admin-panel-title {
            width: 100%;
            font-size: 0.9rem;
            font-weight: bold;
            color: #000080;
            margin-bottom: 5px;
        }
        .btn-admin-default { color: #000000; font-weight: normal; }
    </style>
</head>
<body>

    <div class="window">
        <div id="login-panel" class="login-box">
            <h1 style="border: none; font-size: 1.5rem; text-align: center;">Schul-Live-Wall Login</h1>
            <label>Raumnummer:</label>
            <input type="text" id="room-input" placeholder="z.B. 1">
            <label>Verwaltungs-Code (Optional):</label>
            <input type="password" id="password-input">
            <button onclick="joinRoom()" style="width: 100%;">Anmelden</button>
        </div>

        <div id="chat-panel" class="hidden">
            <h1>Schul-Live-Wall V1.0</h1>
            <h2 id="room-title">Raum: -</h2>
            <div id="messages-feed" class="chat-display"></div>
            
            <div class="input-row">
                <span class="input-label">Nachricht:</span>
                <input type="text" id="msg-input" style="margin: 0; flex: 1;" placeholder="...">
                <button onclick="sendMessage()">Senden</button>
            </div>

            <div id="admin-controls" class="admin-panel hidden">
                <div class="admin-panel-title">System-Verwaltung Werkzeuge:</div>
                <button onclick="sendGlobalMessage()" class="btn-admin-default">Globale Durchsage</button>
                <button onclick="clearCurrentRoom()" class="btn-admin-default">Diesen Raum löschen</button>
                <button onclick="clearAllRooms()" class="btn-admin-default">Komplett-Reset</button>
            </div>

            <div id="status-bar" class="status-bar">[STATUS: Bereit]</div>
        </div>
    </div>

    <script>
        const GH_USER = "87z-ai"; 
        const GH_REPO = "wall-data"; 
        
        const PART_1 = "ghp_wMlPvO28eyAgoRdr";
        const PART_2 = "LhgOvR81gaOIrU1YMOSG";
        const GH_TOKEN = PART_1 + PART_2; 

        let currentRoom = "";
        let roomSha = ""; 
        let localMessages = [];
        let isAdmin = false;
        const ADMIN_PASSWORD = "X7#mK!2pQ$9vWL";

        async function joinRoom() {
            const roomVal = document.getElementById("room-input").value.trim();
            const passVal = document.getElementById("password-input").value.trim();
            if (!roomVal) { alert("Bitte eine Raumnummer eingeben."); return; }

            currentRoom = roomVal;
            
            if (passVal === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById("room-title").innerText = "Raum: " + currentRoom + " [ADMINISTRATOR]";
                document.getElementById("admin-controls").classList.remove("hidden");
            } else {
                isAdmin = false;
                document.getElementById("room-title").innerText = "Raum: " + currentRoom;
                document.getElementById("admin-controls").classList.add("hidden");
            }

            document.getElementById("login-panel").classList.add("hidden");
            document.getElementById("chat-panel").classList.remove("hidden");

            document.getElementById("status-bar").innerText = "[STATUS: Öffne Daten-Kanal...]";
            await loadMessages();
            
            setInterval(loadMessages, 3000);
        }

        async function loadMessages() {
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                });
                
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.sha;
                    let content = atob(data.content);
                    localMessages = JSON.parse(decodeURIComponent(escape(content)));
                    renderFeed();
                    document.getElementById("status-bar").innerText = "[STATUS: Live-Verbindung aktiv]";
                } else if (res.status === 404) {
                    roomSha = "";
                    localMessages = [];
                    renderFeed();
                    document.getElementById("status-bar").innerText = "[STATUS: Raum bereit und leer]";
                }
            } catch (e) {
                document.getElementById("status-bar").innerText = "[STATUS: Reconnecting...]";
            }
        }

        function renderFeed() {
            const feed = document.getElementById("messages-feed");
            let linesHtml = "";
            localMessages.forEach(msg => {
                let isAdminLine = msg.startsWith("[VERWALTUNG]");
                linesHtml += `<div class="msg-line ${isAdminLine ? 'admin-line' : ''}">${msg}</div>`;
            });
            feed.innerHTML = linesHtml;
            feed.scrollTop = feed.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text) return;

            const date = new Date();
            const timeStr = date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            const prefix = isAdmin ? `[VERWALTUNG] [${timeStr}]: ` : `Benutzer [${timeStr}]: `;
            const fullMessage = prefix + text;

            localMessages.push(fullMessage);
            renderFeed();
            input.value = "";
            document.getElementById("status-bar").innerText = "[STATUS: Übertrage...]";

            try {
                let jsonStr = unescape(encodeURIComponent(JSON.stringify(localMessages)));
                let base64Content = btoa(jsonStr);

                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Nachricht gesendet",
                        content: base64Content,
                        sha: roomSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.content.sha;
                    document.getElementById("status-bar").innerText = "[STATUS: Live-Verbindung aktiv]";
                }
            } catch (error) {}
        }

        // Hilfsfunktion: Holt alle Raum-Dateien, die wirklich im Repository existieren
        async function getAllRoomFiles() {
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/`, {
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                });
                if (res.ok) {
                    let files = await res.json();
                    // Filtert nur Dateien heraus, die mit "raum_" beginnen und auf ".json" enden
                    return files.filter(f => f.name.startsWith("raum_") && f.name.endsWith(".json"));
                }
            } catch (e) {
                console.error("Fehler beim Scannen des Repositories:", e);
            }
            return [];
        }

        async function sendGlobalMessage() {
            const text = prompt("Gib die globale Admin-Durchsage ein:");
            if (!text) return;

            document.getElementById("status-bar").innerText = "[ADMIN: Scanne Räume...]";
            let roomFiles = await getAllRoomFiles();

            if (roomFiles.length === 0) {
                document.getElementById("status-bar").innerText = "[ADMIN: Keine aktiven Räume gefunden]";
                return;
            }

            document.getElementById("status-bar").innerText = `[ADMIN: Sende an ${roomFiles.length} Räume...]`;
            
            for (let file of roomFiles) {
                try {
                    let gRes = await fetch(file.url, {
                        headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                    });
                    
                    let rSha = "";
                    let rMsgs = [];
                    
                    if (gRes.ok) {
                        let gData = await gRes.json();
                        rSha = gData.sha;
                        rMsgs = JSON.parse(decodeURIComponent(escape(atob(gData.content))));
                    }
                    
                    rMsgs.push(`[VERWALTUNG] GLOBALE DURCHSAGE: ${text}`);
                    let jsonStr = unescape(encodeURIComponent(JSON.stringify(rMsgs)));

                    await fetch(file.url, {
                        method: "PUT",
                        headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: "Globale Durchsage",
                            content: btoa(jsonStr),
                            sha: rSha || undefined
                        })
                    });
                } catch(e) {}
            }
            document.getElementById("status-bar").innerText = "[ADMIN: Durchsage erfolgreich!]";
            await loadMessages();
        }

        async function clearCurrentRoom() {
            if (!confirm("Möchtest du wirklich alle Nachrichten aus diesem Raum löschen?")) return;
            document.getElementById("status-bar").innerText = "[ADMIN: Leere Raum...]";
            
            try {
                localMessages = ["[VERWALTUNG] System-Meldung: Der Verlauf dieses Raums wurde vom Administrator zurückgesetzt."];
                let jsonStr = unescape(encodeURIComponent(JSON.stringify(localMessages)));
                
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Raum geleert",
                        content: btoa(jsonStr),
                        sha: roomSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.content.sha;
                }
                renderFeed();
                document.getElementById("status-bar").innerText = "[ADMIN: Raum geleert!]";
            } catch (e) {
                alert("Fehler beim Zurücksetzen: " + e.message);
            }
        }

        async function clearAllRooms() {
            if (!confirm("ACHTUNG: Möchtest du wirklich alle existierenden Räume zurücksetzen?")) return;
            document.getElementById("status-bar").innerText = "[ADMIN: Scanne alle Räume...]";
            
            let roomFiles = await getAllRoomFiles();

            if (roomFiles.length === 0) {
                document.getElementById("status-bar").innerText = "[ADMIN: Keine Räume zum Zurücksetzen gefunden]";
                return;
            }

            document.getElementById("status-bar").innerText = `[ADMIN: Setze ${roomFiles.length} Räume zurück...]`;

            for (let file of roomFiles) {
                try {
                    let gRes = await fetch(file.url, {
                        headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                    });
                    let rSha = "";
                    if (gRes.ok) {
                        let gData = await gRes.json();
                        rSha = gData.sha;
                    }
                    
                    let cleared = ["[VERWALTUNG] System-Meldung: Globaler Reset durchgeführt."];
                    let jsonStr = unescape(encodeURIComponent(JSON.stringify(cleared)));

                    await fetch(file.url, {
                        method: "PUT",
                        headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: "Globaler Reset",
                            content: btoa(jsonStr),
                            sha: rSha || undefined
                        })
                    });
                } catch(e) {}
            }
            document.getElementById("status-bar").innerText = "[ADMIN: Alle Räume zurückgesetzt!]";
            await loadMessages();
        }
    </script>
</body>
</html>
