<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-Live-Wall V1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
        body { background-color: #d4d4d4; color: #000000; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .window { background-color: #d4d4d4; width: 100%; max-width: 800px; padding: 10px; }
        h1 { font-size: 2rem; margin: 0 0 15px 0; color: #000000; font-weight: bold; border-bottom: 2px solid #000000; padding-bottom: 5px; }
        h2 { font-size: 1.2rem; margin: 10px 0; color: #000000; font-weight: normal; }
        
        /* LOGIN / EINGABEN */
        .login-box { border: 1px solid #000000; background: #ffffff; padding: 20px; max-width: 400px; margin: 0 auto; }
        input[type="text"], input[type="password"] { width: 100%; padding: 6px; margin: 5px 0 15px 0; border: 1px solid #7f7f7f; background: #ffffff; color: #000000; font-size: 1rem; }
        
        /* BUTTONS */
        button { padding: 8px 20px; background-color: #000080; color: #ffffff; border: 1px solid #000000; font-size: 1rem; cursor: pointer; font-weight: normal; }
        button:hover { background-color: #0000ff; }
        .hidden { display: none !important; }
        
        /* TEXT-ANZEIGEBOX (RETRO WEB-STYLE) */
        .chat-display { width: 100%; height: 350px; background-color: #ffffff; border: 1px solid #7f7f7f; overflow-y: auto; padding: 10px; margin-bottom: 15px; font-family: 'Courier New', Courier, monospace; font-size: 0.95rem; line-height: 1.4; }
        
        /* MESSAGES */
        .msg-line { margin-bottom: 8px; color: #000000; text-align: left; word-break: break-word; }
        .admin-line { color: #000080; font-weight: bold; }
        
        /* ADMIN BEREICH */
        .admin-section { border: 1px dashed #000000; padding: 10px; margin-bottom: 15px; background-color: #e0e0e0; text-align: left; }
        .delete-btn { background-color: #800000; margin-top: 10px; }
        .delete-btn:hover { background-color: #ff0000; }
        
        /* UNTEN ANORDNUNG */
        .input-row { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 15px; }
        .input-label { font-size: 1.1rem; whitespace: nowrap; }
        .status-bar { text-align: left; font-size: 0.9rem; color: #333333; font-family: 'Courier New', Courier, monospace; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="window">
        <div id="login-panel" class="login-box">
            <h1 style="border: none; font-size: 1.5rem; text-align: center;">Schul-Live-Wall Login</h1>
            <label>Raumnummer:</label>
            <input type="text" id="room-input" placeholder="z.B. 1">
            <label>Verwaltungs-Code (Optional):</label>
            <input type="password" id="password-input">
            <button onclick="joinRoom()" style="width: 100%;">Anmelden</button>
        </div>

        <div id="chat-panel" class="hidden">
            <h1>Schul-Live-Wall V1.0</h1>
            <h2 id="room-title">Raum: -</h2>

            <div id="admin-panel" class="admin-section hidden">
                <div style="font-weight: bold; margin-bottom: 5px; color: #000080;">[VERWALTUNGS-PANEL]</div>
                <label>Systemweite Durchsage senden:</label>
                <div style="display: flex; gap: 10px; margin-top: 5px;">
                    <input type="text" id="announcement-input" style="margin: 0;" placeholder="Wichtiger Text...">
                    <button onclick="sendAnnouncement()">Senden</button>
                </div>
                <button onclick="clearCurrentRoom()" class="delete-btn">Diesen Raum leeren</button>
            </div>

            <div id="announcement-box" style="color: #800000; font-weight: bold; text-align: left; margin-bottom: 10px; font-family: 'Courier New', Courier, monospace;" class="hidden"></div>

            <div id="messages-feed" class="chat-display"></div>
            
            <div class="input-row">
                <span class="input-label">Nachricht:</span>
                <input type="text" id="msg-input" style="margin: 0; flex: 1;" placeholder="...">
                <button onclick="sendMessage()">Senden</button>
            </div>

            <div id="status-bar" class="status-bar">[STATUS: Bereit]</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lgvcgmvbdbabowwxgqmcv.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxndmNnbXZiZGFib3d3eGdxbWN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMjEyNjMsImV4cCI6MjA5NDY5NzI2M30.X3xv6v3d5OCGsgVx4SeIVQRa0aZHFC9jejpQI5ptnvs";
        
        const _supabaseClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
        
        let currentRoom = "";
        let isAdmin = false;
        
        // Das neue, extrem sichere Zufallspasswort
        const ADMIN_PASSWORD = "X7#mK!2pQ$9vWL";

        function joinRoom() {
            const roomVal = document.getElementById("room-input").value.trim();
            const passVal = document.getElementById("password-input").value.trim();

            if (!roomVal) {
                alert("[HINWEIS] Bitte eine Raumnummer eingeben.");
                return;
            }

            currentRoom = roomVal;
            
            if (passVal === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById("admin-panel").classList.remove("hidden");
            }

            document.getElementById("room-title").innerText = "Raum: " + currentRoom;
            document.getElementById("login-panel").classList.add("hidden");
            document.getElementById("chat-panel").classList.remove("hidden");

            if (_supabaseClient) {
                loadMessages();
                loadAnnouncements();

                _supabaseClient
                    .channel('schema-db-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, payload => {
                        loadMessages();
                    })
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'announcements' }, payload => {
                        loadAnnouncements();
                    })
                    .subscribe();
            } else {
                document.getElementById("status-bar").innerText = "[HINWEIS] Datenbank-Bibliothek konnte nicht geladen werden.";
            }
        }

        async function loadMessages() {
            if (!_supabaseClient) return;
            const { data, error } = await _supabaseClient
                .from('messages')
                .select('*')
                .eq('room', currentRoom)
                .order('id', { ascending: true });

            if (!error && data) {
                const feed = document.getElementById("messages-feed");
                feed.innerHTML = "";
                data.forEach(msg => {
                    const div = document.createElement("div");
                    div.classList.add("msg-line");
                    
                    const date = new Date(msg.created_at);
                    const timeStr = date.toLocaleDateString('de-DE') + " " + date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

                    if (msg.admin_post === "true") {
                        div.classList.add("admin-line");
                        div.innerText = "[VERWALTUNG] [" + timeStr + "]: " + msg.text;
                    } else {
                        div.innerText = "Benutzer [" + timeStr + "]: " + msg.text;
                    }
                    feed.appendChild(div);
                });
                feed.scrollTop = feed.scrollHeight;
            }
        }

        async function loadAnnouncements() {
            if (!_supabaseClient) return;
            const { data } = await _supabaseClient.from('announcements').select('*').order('id', { ascending: false }).limit(1);
            if (data && data.length > 0) {
                const box = document.getElementById("announcement-box");
                box.innerText = "[SYSTEM-DURCHSAGE]: " + data[0].text;
                box.classList.remove("hidden");
            }
        }

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text) return;

            if (!_supabaseClient) {
                document.getElementById("status-bar").innerText = "[HINWEIS] Letzter Sendestatus: Keine Datenbank-Verbindung.";
                return;
            }

            const { error } = await _supabaseClient
                .from('messages')
                .insert([{ 
                    room: currentRoom, 
                    text: text,
                    admin_post: isAdmin ? "true" : "false"
                }]);

            if (error) {
                document.getElementById("status-bar").innerText = "[HINWEIS] Letzter Sendestatus: " + error.message;
            } else {
                input.value = "";
                document.getElementById("status-bar").innerText = "[STATUS: Nachricht erfolgreich gesendet]";
            }
        }

        async function sendAnnouncement() {
            const input = document.getElementById("announcement-input");
            const text = input.value.trim();
            if (!text || !_supabaseClient) return;

            const { error } = await _supabaseClient.from('announcements').insert([{ text: text }]);
            if (error) {
                document.getElementById("status-bar").innerText = "[HINWEIS] Durchsage-Fehler: " + error.message;
            } else {
                input.value = "";
            }
        }

        async function clearCurrentRoom() {
            if (!confirm("Alle Daten aus Raum " + currentRoom + " unwiderruflich löschen?")) return;
            if (!_supabaseClient) return;

            const { error } = await _supabaseClient.from('messages').delete().eq('room', currentRoom);
            if (error) {
                document.getElementById("status-bar").innerText = "[HINWEIS] Lösch-Fehler: " + error.message;
            } else {
                document.getElementById("status-bar").innerText = "[STATUS: Raum erfolgreich geleert]";
            }
        }
    </script>
</body>
</html>
