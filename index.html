<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-Live-Wall V1.0</title>
    <style>
        /* Globaler Windows 95 Retro-Look */
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
        body { background-color: #d4d4d4; color: #000000; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .window { 
            background-color: #d4d4d4; width: 100%; max-width: 800px; padding: 4px; 
            border-top: 2px solid #ffffff; border-left: 2px solid #ffffff;
            border-right: 2px solid #555555; border-bottom: 2px solid #555555;
        }
        
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0); color: #ffffff;
            padding: 4px 6px; font-weight: bold; font-size: 1rem;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }

        h2 { font-size: 1.2rem; margin: 10px 0; color: #000000; font-weight: normal; }
        .login-box { background: #d4d4d4; padding: 10px; max-width: 400px; margin: 30px auto; }
        .login-content { background: #d4d4d4; padding: 15px; }
        label { display: block; margin-top: 10px; font-size: 0.95rem; }

        input[type="text"], input[type="password"] { 
            width: 100%; padding: 4px; margin: 4px 0 12px 0; 
            border-top: 2px solid #555555; border-left: 2px solid #555555;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
            background: #ffffff; color: #000000; font-size: 1rem; outline: none;
        }
        
        button { 
            padding: 6px 20px; background-color: #d4d4d4; color: #000000; 
            border-top: 2px solid #ffffff; border-left: 2px solid #ffffff;
            border-right: 2px solid #555555; border-bottom: 2px solid #555555;
            font-size: 1rem; cursor: pointer; outline: none;
        }
        button:active { 
            border-top: 2px solid #555555; border-left: 2px solid #555555;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
        }
        
        .hidden { display: none !important; }
        
        /* Das neue eingebettete Durchsagen-Feld im originalen OS-Style */
        .announcement-container {
            border-top: 2px solid #555555; border-left: 2px solid #555555;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
            background-color: #e0e0e0;
            padding: 8px 12px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .announcement-tag {
            color: #000080;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            background: #d4d4d4;
            padding: 2px 6px;
            border-top: 1px solid #ffffff; border-left: 1px solid #ffffff;
            border-right: 1px solid #555555; border-bottom: 1px solid #555555;
        }
        .announcement-text {
            font-weight: bold;
            color: #000000;
            word-break: break-word;
        }
        .announcement-empty {
            color: #7f7f7f;
            font-style: italic;
            font-weight: normal;
        }

        /* Chat-Fenster */
        .chat-display { 
            width: 100%; height: 350px; background-color: #ffffff; 
            border-top: 2px solid #555555; border-left: 2px solid #555555;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
            overflow-y: auto; padding: 10px; margin-bottom: 15px; 
            font-family: 'Courier New', Courier, monospace; font-size: 0.95rem; line-height: 1.4; 
        }
        
        .msg-line { margin-bottom: 8px; color: #000000; text-align: left; word-break: break-word; }
        .admin-line { color: #000080; font-weight: bold; }
        .input-row { display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 15px; }
        .input-label { font-size: 1.1rem; white-space: nowrap; }
        
        .status-bar { 
            text-align: left; font-size: 0.9rem; color: #000000; padding: 3px;
            border-top: 2px solid #555555; border-left: 2px solid #555555;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
            background-color: #d4d4d4; margin-top: 5px;
        }
        
        .admin-panel { 
            border-top: 2px solid #555555; border-left: 2px solid #555555;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
            padding: 15px; margin-top: 15px; background: #d4d4d4; display: flex; gap: 10px; flex-wrap: wrap; 
        }
        .admin-panel-title { width: 100%; font-size: 0.9rem; font-weight: bold; color: #000080; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="window">
        <div class="title-bar">
            <span id="window-title-text">Schul-Live-Wall V1.0</span>
            <span style="font-size: 0.8rem; border: 1px solid #ffffff; padding: 0px 4px; background: #d4d4d4; color: #000; font-weight: bold;">X</span>
        </div>

        <div id="login-panel" class="login-box">
            <div class="login-content">
                <h1 style="font-size: 1.4rem; text-align: center; margin-top: 0;">System-Anmeldung</h1>
                <label>Raumnummer:</label>
                <input type="text" id="room-input" placeholder="z.B. 1">
                <label>Verwaltungs-Code (Optional):</label>
                <input type="password" id="password-input">
                <button onclick="joinRoom()" style="width: 100%; margin-top: 10px;">Anmelden</button>
            </div>
        </div>

        <div id="chat-panel" class="hidden" style="padding: 6px;">
            
            <div class="announcement-container">
                <span class="announcement-tag">System</span>
                <span id="announcement-field" class="announcement-empty">[Keine aktive System-Durchsage]</span>
            </div>

            <h2 id="room-title">Raum: -</h2>
            <div id="messages-feed" class="chat-display"></div>
            
            <div class="input-row">
                <span class="input-label">Nachricht:</span>
                <input type="text" id="msg-input" style="margin: 0; flex: 1;" placeholder="..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Senden</button>
            </div>

            <div id="admin-controls" class="admin-panel hidden">
                <div class="admin-panel-title">System-Verwaltung Werkzeuge:</div>
                <button onclick="sendGlobalMessage()">Globale Durchsage</button>
                <button onclick="clearCurrentRoom()">Diesen Raum löschen</button>
                <button onclick="clearAllRooms()">Komplett-Reset</button>
            </div>
        </div>
        
        <div id="status-bar" class="status-bar">Bereit.</div>
    </div>

    <script>
        const GH_USER = "87z-ai"; 
        const GH_REPO = "wall-data"; 
        const GH_TOKEN = "ghp_wMlPvO28eyAgoRdr" + "LhgOvR81gaOIrU1YMOSG"; 

        let currentRoom = "";
        let roomSha = ""; 
        let globalSha = "";
        let localMessages = [];
        let isAdmin = false;
        const ADMIN_PASSWORD = "X7#mK!2pQ$9vWL";

        async function joinRoom() {
            const roomVal = document.getElementById("room-input").value.trim();
            const passVal = document.getElementById("password-input").value.trim();
            if (!roomVal) { alert("Bitte eine Raumnummer eingeben."); return; }

            currentRoom = roomVal;
            
            if (passVal === ADMIN_PASSWORD) {
                isAdmin = true;
                document.getElementById("room-title").innerText = "Raum: " + currentRoom + " [ADMINISTRATOR]";
                document.getElementById("window-title-text").innerText = "Schul-Live-Wall V1.0 [ADMIN-MODUS]";
                document.getElementById("admin-controls").classList.remove("hidden");
            } else {
                isAdmin = false;
                document.getElementById("room-title").innerText = "Raum: " + currentRoom;
            }

            document.getElementById("login-panel").classList.add("hidden");
            document.getElementById("chat-panel").classList.remove("hidden");
            
            await loadAllData();
            setInterval(loadAllData, 3000);
        }

        async function loadAllData() {
            let globalMessageText = "";

            // 1. Systemdatei laden
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/global_system.json`, {
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                });
                if (res.ok) {
                    let data = await res.json();
                    globalSha = data.sha;
                    let systemData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    if (systemData) {
                        globalMessageText = systemData.globalMessage || "";
                    }
                }
            } catch (e) {}

            // Visuelle Zuweisung des System-Banners
            const displayField = document.getElementById("announcement-field");
            if (globalMessageText) {
                displayField.innerText = globalMessageText;
                displayField.className = "announcement-text";
            } else {
                displayField.innerText = "[Keine aktive System-Durchsage]";
                displayField.className = "announcement-empty";
            }

            // 2. Chatverlauf laden
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                });
                
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.sha;
                    let content = atob(data.content);
                    localMessages = JSON.parse(decodeURIComponent(escape(content)));
                    renderFeed();
                } else if (res.status === 404) {
                    roomSha = "";
                    localMessages = [];
                    renderFeed();
                }
                document.getElementById("status-bar").innerText = "Live-Verbindung aktiv.";
            } catch (e) {
                document.getElementById("status-bar").innerText = "Verbindung unruhig...";
            }
        }

        function renderFeed() {
            const feed = document.getElementById("messages-feed");
            if (!feed) return;
            let linesHtml = "";
            if (Array.isArray(localMessages)) {
                localMessages.forEach(msg => {
                    let isAdminLine = msg.startsWith("[VERWALTUNG]");
                    linesHtml += `<div class="msg-line ${isAdminLine ? 'admin-line' : ''}">${msg}</div>`;
                });
            }
            feed.innerHTML = linesHtml;
            feed.scrollTop = feed.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text) return;

            const date = new Date();
            const timeStr = date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            const prefix = isAdmin ? `[VERWALTUNG] [${timeStr}]: ` : `Benutzer [${timeStr}]: `;
            const fullMessage = prefix + text;

            localMessages.push(fullMessage);
            renderFeed();
            input.value = "";

            try {
                let jsonStr = unescape(encodeURIComponent(JSON.stringify(localMessages)));
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Nachricht gesendet",
                        content: btoa(jsonStr),
                        sha: roomSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.content.sha;
                }
            } catch (error) {}
        }

        async function sendGlobalMessage() {
            const text = prompt("Globale Admin-Durchsage eingeben (Leerlassen zum Löschen):");
            if (text === null) return; 

            document.getElementById("status-bar").innerText = "Aktualisiere Durchsage auf dem Server...";
            let payload = { globalMessage: text.trim() };
            let jsonStr = unescape(encodeURIComponent(JSON.stringify(payload)));

            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/global_system.json`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Durchsage geaendert",
                        content: btoa(jsonStr),
                        sha: globalSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    globalSha = data.content.sha;
                    document.getElementById("status-bar").innerText = "Durchsage erfolgreich übertragen!";
                } else {
                    let retryRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/global_system.json`, {
                        method: "PUT",
                        headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: "Durchsage initialisiert",
                            content: btoa(jsonStr)
                        })
                    });
                    if (retryRes.ok) {
                        let retryData = await retryRes.json();
                        globalSha = retryData.content.sha;
                        document.getElementById("status-bar").innerText = "Durchsage erfolgreich erstellt!";
                    }
                }
            } catch (e) { alert("Fehler: " + e.message); }
            await loadAllData();
        }

        async function clearCurrentRoom() {
            if (!confirm("Diesen Raum wirklich leeren?")) return;
            document.getElementById("status-bar").innerText = "Leere aktuellen Raum...";
            
            try {
                let fresh = ["[VERWALTUNG] System-Meldung: Der Verlauf dieses Raums wurde vom Administrator zurückgesetzt."];
                let jsonStr = unescape(encodeURIComponent(JSON.stringify(fresh)));
                
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Raum zurueckgesetzt",
                        content: btoa(jsonStr),
                        sha: roomSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.content.sha;
                    localMessages = fresh;
                    renderFeed();
                    document.getElementById("status-bar").innerText = "Raum geleert.";
                }
            } catch (e) {}
        }

        async function clearAllRooms() {
            if (!confirm("ACHTUNG: Möchtest du wirklich ALLE existierenden Räume auf GitHub unwiderruflich leeren?")) return;
            document.getElementById("status-bar").innerText = "Suche aktive Räume auf dem Server...";
            
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/`, {
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                });
                
                if (!res.ok) { alert("Fehler beim Abrufen der Raumliste."); return; }
                let files = await res.json();
                let roomFiles = files.filter(f => f.name.startsWith("raum_") && f.name.endsWith(".json"));
                
                let resetContent = ["[VERWALTUNG] System-Meldung: Globaler Reset durchgeführt."];
                let jsonStr = unescape(encodeURIComponent(JSON.stringify(resetContent)));
                let base64Content = btoa(jsonStr);

                for (let i = 0; i < roomFiles.length; i++) {
                    let fileInfo = roomFiles[i];
                    document.getElementById("status-bar").innerText = `Lösche Verlauf: ${fileInfo.name} (${i+1}/${roomFiles.length})...`;
                    
                    await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${fileInfo.name}`, {
                        method: "PUT",
                        headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: "Globaler Reset",
                            content: base64Content,
                            sha: fileInfo.sha
                        })
                    });
                    await new Promise(r => setTimeout(r, 250));
                }
                
                document.getElementById("status-bar").innerText = "Komplett-Reset für alle Räume abgeschlossen!";
                await loadAllData();
            } catch(e) {
                alert("Fehler beim Komplett-Reset: " + e.message);
            }
        }
    </script>
</body>
</html>
