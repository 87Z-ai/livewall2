<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schul-Live-Wall V1.0</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
        body { background-color: #3b8e8f; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        /* Das Hauptfenster im Windows 95 Stil */
        .window { 
            background-color: #d4d4d4; width: 100%; max-width: 800px; padding: 3px; 
            border-top: 2px solid #ffffff; border-left: 2px solid #ffffff;
            border-right: 2px solid #555555; border-bottom: 2px solid #555555;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0); color: #ffffff;
            padding: 4px 6px; font-weight: bold; font-size: 1rem;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }

        .title-bar-controls button {
            padding: 1px 4px; font-size: 0.75rem; font-weight: bold; background: #d4d4d4; color: #000;
            border-top: 1px solid #fff; border-left: 1px solid #fff;
            border-right: 1px solid #555; border-bottom: 1px solid #555;
            min-width: 16px; height: 16px; cursor: pointer; line-height: 1;
        }

        h2 { font-size: 1.1rem; margin: 5px 0 10px 0; color: #000000; font-weight: bold; }
        .login-box { background: #d4d4d4; padding: 10px; max-width: 450px; margin: 30px auto; border: 1px solid #808080; }
        .login-content { background: #d4d4d4; padding: 15px; }
        label { display: block; margin-top: 10px; font-size: 0.95rem; font-weight: bold; }

        input[type="text"], input[type="password"] { 
            width: 100%; padding: 5px; margin: 4px 0 12px 0; 
            border-top: 2px solid #555555; border-left: 2px solid #555555;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
            background: #ffffff; color: #000000; font-size: 1rem; outline: none;
        }
        
        button { 
            padding: 6px 15px; background-color: #d4d4d4; color: #000000; 
            border-top: 2px solid #ffffff; border-left: 2px solid #ffffff;
            border-right: 2px solid #555555; border-bottom: 2px solid #555555;
            font-size: 0.95rem; cursor: pointer; outline: none;
        }
        button:active { 
            border-top: 2px solid #555555; border-left: 2px solid #555555;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
        }
        
        .hidden { display: none !important; }
        
        /* Das System-Durchsagen-Banner */
        .announcement-container {
            border-top: 2px solid #555555; border-left: 2px solid #555555;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
            background-color: #e0e0e0; padding: 8px 12px; margin-bottom: 15px;
            font-size: 0.95rem; display: flex; align-items: center; gap: 10px;
        }
        .announcement-tag {
            color: #ffffff; font-weight: bold; text-transform: uppercase; font-size: 0.75rem;
            background: #000080; padding: 2px 6px; letter-spacing: 1px;
        }
        .announcement-text { font-weight: bold; color: #000080; word-break: break-word; font-family: monospace; }
        .announcement-empty { color: #7f7f7f; font-style: italic; font-weight: normal; }

        /* Chat-Verlauf */
        .chat-display { 
            width: 100%; height: 380px; background-color: #ffffff; 
            border-top: 2px solid #555555; border-left: 2px solid #555555;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
            overflow-y: auto; padding: 10px; margin-bottom: 15px; 
            font-family: 'Courier New', Courier, monospace; font-size: 0.95rem; line-height: 1.4; 
        }
        
        .msg-line { margin-bottom: 6px; color: #000000; text-align: left; word-break: break-word; }
        .admin-line { color: #000080; font-weight: bold; border-left: 3px solid #000080; padding-left: 5px; }
        
        .input-row { display: flex; align-items: center; gap: 5px; width: 100%; margin-bottom: 15px; }
        .input-label { font-size: 0.95rem; font-weight: bold; white-space: nowrap; margin-right: 5px; }
        
        .status-bar { 
            text-align: left; font-size: 0.85rem; color: #000000; padding: 4px;
            border-top: 2px solid #808080; border-left: 2px solid #808080;
            border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff;
            background-color: #d4d4d4; margin-top: 5px; font-family: monospace;
        }
        
        /* Admin-Dienstprogramme */
        .admin-panel { 
            border: 1px dashed #000080; padding: 12px; margin-top: 15px; 
            background: #e4e4e4; display: flex; gap: 8px; flex-wrap: wrap; 
        }
        .admin-panel-title { width: 100%; font-size: 0.85rem; font-weight: bold; color: #000080; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="window">
        <div class="title-bar">
            <span id="window-title-text">Schul-Live-Wall V1.0</span>
            <div class="title-bar-controls">
                <button>?</button>
                <button>X</button>
            </div>
        </div>

        <div id="login-panel" class="login-box">
            <div class="login-content">
                <h1 style="font-size: 1.3rem; text-align: center; margin-top: 0; border-bottom: 2px solid #808080; padding-bottom: 5px;">System-Anmeldung</h1>
                <label>Raumnummer:</label>
                <input type="text" id="room-input" placeholder="z.B. 1">
                <label>Verwaltungs-Token (Feld für Schüler leer lassen):</label>
                <input type="password" id="password-input" placeholder="ghp_...">
                <button onclick="joinRoom()" style="width: 100%; margin-top: 5px; font-weight: bold;">Verbinden</button>
            </div>
        </div>

        <div id="chat-panel" class="hidden" style="padding: 6px;">
            <div class="announcement-container">
                <span class="announcement-tag">System-Durchsage</span>
                <span id="announcement-field" class="announcement-empty">[Keine aktive System-Durchsage]</span>
            </div>

            <h2 id="room-title">Raum: -</h2>
            <div id="messages-feed" class="chat-display"></div>
            
            <div class="input-row">
                <span class="input-label">Eingabe:</span>
                <input type="text" id="msg-input" style="margin: 0; flex: 1;" placeholder="Nachricht eintippen..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="font-weight: bold;">Senden</button>
            </div>

            <div id="admin-controls" class="admin-panel hidden">
                <div class="admin-panel-title">🛠️ Administrator-Werkzeuge (Schreibrechte aktiv):</div>
                <button onclick="sendGlobalMessage()">Globale Durchsage</button>
                <button onclick="clearCurrentRoom()">Diesen Raum löschen</button>
                <button onclick="clearAllRooms()">Komplett-Reset (Alle Räume)</button>
            </div>
        </div>
        
        <div id="status-bar" class="status-bar">System bereit. Bitte einloggen.</div>
    </div>

    <script>
        const GH_USER = "87z-ai"; 
        const GH_REPO = "wall-data"; 
        
        let GH_TOKEN = ""; 
        let currentRoom = "";
        let roomSha = ""; 
        let globalSha = "";
        let localMessages = [];
        let isAdmin = false;

        async function joinRoom() {
            const roomVal = document.getElementById("room-input").value.trim();
            const passVal = document.getElementById("password-input").value.trim();
            if (!roomVal) { alert("Bitte eine Raumnummer eingeben."); return; }

            currentRoom = roomVal;
            
            if (passVal.startsWith("ghp_")) {
                isAdmin = true;
                GH_TOKEN = passVal; 
                document.getElementById("room-title").innerText = "Raum: " + currentRoom + " [ADMINISTRATOR]";
                document.getElementById("window-title-text").innerText = "Schul-Live-Wall V1.0 [ADMIN-MODUS]";
                document.getElementById("admin-controls").classList.remove("hidden");
            } else {
                isAdmin = false;
                GH_TOKEN = ""; 
                document.getElementById("room-title").innerText = "Raum: " + currentRoom + " [SCHÜLER]";
            }

            document.getElementById("login-panel").classList.add("hidden");
            document.getElementById("chat-panel").classList.remove("hidden");
            
            document.getElementById("status-bar").innerText = "Verbindung wird hergestellt...";
            await loadAllData();
            setInterval(loadAllData, 3000);
        }

        function getHeaders() {
            let headers = { "Cache-Control": "no-cache" };
            if (GH_TOKEN) {
                headers["Authorization"] = `token ${GH_TOKEN}`;
            }
            return headers;
        }

        async function loadAllData() {
            let globalMessageText = "";

            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/global_system.json`, {
                    headers: getHeaders()
                });
                if (res.ok) {
                    let data = await res.json();
                    globalSha = data.sha;
                    let systemData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    if (systemData) {
                        globalMessageText = systemData.globalMessage || "";
                    }
                }
            } catch (e) {}

            const displayField = document.getElementById("announcement-field");
            if (globalMessageText) {
                displayField.innerText = globalMessageText;
                displayField.className = "announcement-text";
            } else {
                displayField.innerText = "[Keine aktive System-Durchsage]";
                displayField.className = "announcement-empty";
            }

            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    headers: getHeaders()
                });
                
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.sha;
                    let content = atob(data.content);
                    localMessages = JSON.parse(decodeURIComponent(escape(content)));
                    renderFeed();
                    document.getElementById("status-bar").innerText = "LIVE-VERBINDUNG AKTIV.";
                } else if (res.status === 404) {
                    roomSha = "";
                    localMessages = [];
                    renderFeed();
                    document.getElementById("status-bar").innerText = "RAUM LEER / BEREIT.";
                } else {
                    document.getElementById("status-bar").innerText = "FEHLER beim Laden. Passwort/Token prüfen.";
                }
            } catch (e) {
                document.getElementById("status-bar").innerText = "VERBINDUNG UNRUHIG...";
            }
        }

        function renderFeed() {
            const feed = document.getElementById("messages-feed");
            if (!feed) return;
            let linesHtml = "";
            if (Array.isArray(localMessages)) {
                localMessages.forEach(msg => {
                    let isVerwaltung = msg.startsWith("[VERWALTUNG]");
                    linesHtml += `<div class="msg-line ${isVerwaltung ? 'admin-line' : ''}">${msg}</div>`;
                });
            }
            feed.innerHTML = linesHtml;
            feed.scrollTop = feed.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("msg-input");
            const text = input.value.trim();
            if (!text) return;

            const date = new Date();
            const timeStr = date.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            const prefix = isAdmin ? `[VERWALTUNG] [${timeStr}]: ` : `Schüler [${timeStr}]: `;
            const fullMessage = prefix + text;

            localMessages.push(fullMessage);
            renderFeed();
            input.value = "";

            try {
                let jsonStr = unescape(encodeURIComponent(JSON.stringify(localMessages)));
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    method: "PUT",
                    headers: { ...getHeaders(), "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Wall-Update",
                        content: btoa(jsonStr),
                        sha: roomSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.content.sha;
                }
            } catch (error) {}
        }

        async function sendGlobalMessage() {
            if (!GH_TOKEN) return;
            const text = prompt("Globale Durchsage eingeben (Leerlassen zum Löschen):");
            if (text === null) return; 

            document.getElementById("status-bar").innerText = "Sende globale Nachricht...";
            let payload = { globalMessage: text.trim() };
            let jsonStr = unescape(encodeURIComponent(JSON.stringify(payload)));

            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/global_system.json`, {
                    method: "PUT",
                    headers: { ...getHeaders(), "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Global-Update",
                        content: btoa(jsonStr),
                        sha: globalSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    globalSha = data.content.sha;
                    document.getElementById("status-bar").innerText = "DURCHSAGE LIVE.";
                } else {
                    let retryRes = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/global_system.json`, {
                        method: "PUT",
                        headers: { ...getHeaders(), "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: "Global-Init",
                            content: btoa(jsonStr)
                        })
                    });
                    if (retryRes.ok) {
                        let retryData = await retryRes.json();
                        globalSha = retryData.content.sha;
                        document.getElementById("status-bar").innerText = "DURCHSAGE ERSTELLT.";
                    }
                }
            } catch (e) { alert("Fehler: " + e.message); }
            await loadAllData();
        }

        async function clearCurrentRoom() {
            if (!GH_TOKEN) return;
            if (!confirm("Diesen Raum wirklich komplett leeren?")) return;
            document.getElementById("status-bar").innerText = "Leere Raum...";
            
            try {
                let fresh = ["[VERWALTUNG] System-Meldung: Der Verlauf dieses Raums wurde zurückgesetzt."];
                let jsonStr = unescape(encodeURIComponent(JSON.stringify(fresh)));
                
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/raum_${currentRoom}.json`, {
                    method: "PUT",
                    headers: { ...getHeaders(), "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "Raum-Reset",
                        content: btoa(jsonStr),
                        sha: roomSha || undefined
                    })
                });
                if (res.ok) {
                    let data = await res.json();
                    roomSha = data.content.sha;
                    localMessages = fresh;
                    renderFeed();
                    document.getElementById("status-bar").innerText = "RAUM ERFOLGREICH GELEERT.";
                }
            } catch (e) {}
        }

        async function clearAllRooms() {
            if (!GH_TOKEN) return;
            if (!confirm("ACHTUNG: Möchtest du wirklich ALLE existierenden Räume unwiderruflich leeren?")) return;
            document.getElementById("status-bar").innerText = "Rufe Raumliste ab...";
            
            try {
                let res = await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/`, {
                    headers: getHeaders()
                });
                
                if (!res.ok) { alert("Fehler: Konnte Verzeichnis nicht lesen."); return; }
                let files = await res.json();
                let roomFiles = files.filter(f => f.name.startsWith("raum_") && f.name.endsWith(".json"));
                
                let resetContent = ["[VERWALTUNG] System-Meldung: Globaler Reset durchgeführt."];
                let jsonStr = unescape(encodeURIComponent(JSON.stringify(resetContent)));
                let base64Content = btoa(jsonStr);

                for (let i = 0; i < roomFiles.length; i++) {
                    let fileInfo = roomFiles[i];
                    document.getElementById("status-bar").innerText = `Lösche: ${fileInfo.name} (${i+1}/${roomFiles.length})...`;
                    
                    await fetch(`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${fileInfo.name}`, {
                        method: "PUT",
                        headers: { ...getHeaders(), "Content-Type": "application/json" },
                        body: JSON.stringify({
                            message: "Global-Reset-All",
                            content: base64Content,
                            sha: fileInfo.sha
                        })
                    });
                    await new Promise(r => setTimeout(r, 200));
                }
                
                document.getElementById("status-bar").innerText = "KOMPLETT-RESET ERFOLGREICH!";
                await loadAllData();
            } catch(e) {
                alert("Fehler beim Komplett-Reset: " + e.message);
            }
        }
    </script>
</body>
</html>
